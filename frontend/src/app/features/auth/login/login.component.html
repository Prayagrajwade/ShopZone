<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="demo-hint">
      <strong>Demo Admin:</strong> admin&#64;shop.com / admin123
      <button type="button" class="fill-btn" (click)="fillAdmin()">Fill</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com"
          [class.error]="form.get('email')?.invalid && form.get('email')?.touched" />
        <span class="err-msg" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Valid email required
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••"
          [class.error]="form.get('password')?.invalid && form.get('password')?.touched" />
        <span class="err-msg" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Password required
        </span>
      </div>

      <div class="error-banner" *ngIf="error">{{ error }}</div>

      <button type="submit" class="submit-btn" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="spinner">⟳</span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/register">Register</a>
    </div>
  </div>
</div>
