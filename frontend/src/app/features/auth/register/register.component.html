<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">✨</div>
      <h1>Create Account</h1>
      <p>Join ShopZone today</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="name" placeholder="John Doe"
          [class.error]="form.get('name')?.invalid && form.get('name')?.touched" />
        <span class="err-msg" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">Name required</span>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com"
          [class.error]="form.get('email')?.invalid && form.get('email')?.touched" />
        <span class="err-msg" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">Valid email required</span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Min 6 characters"
          [class.error]="form.get('password')?.invalid && form.get('password')?.touched" />
        <span class="err-msg" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">Min 6 characters</span>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" formControlName="confirmPassword" placeholder="Repeat password"
          [class.error]="form.errors?.['mismatch'] && form.get('confirmPassword')?.touched" />
        <span class="err-msg" *ngIf="form.errors?.['mismatch'] && form.get('confirmPassword')?.touched">Passwords do not match</span>
      </div>

      <div class="error-banner" *ngIf="error">{{ error }}</div>

      <button type="submit" class="submit-btn" [disabled]="loading">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="spinner">⟳</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/login">Sign In</a>
    </div>
  </div>
</div>
